<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STARSHIP WATCH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #0a0a0a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #ffffff;
      --text-secondary: rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.3);
      --accent: #4a9eff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --gray: rgba(255,255,255,0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Progress bar (top of page) ── */
    #refresh-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      z-index: 9999;
      transition: width 1s linear;
      opacity: 0.6;
    }

    /* ── Wrapper ── */
    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-size: 16px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .logo-light { font-weight: 200; }
    .logo-bold { font-weight: 500; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-link {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 1; color: var(--text); }

    .last-updated {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* ── Section titles ── */
    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
      margin-top: 64px;
    }

    /* ── Hero / Next Launch ── */
    .hero {
      padding: 80px 0 60px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .hero-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hero-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .hero-title {
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 16px;
      color: var(--text);
    }
    .hero-subtitle {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 40px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .hero-sep {
      color: var(--text-muted);
    }

    /* Timezone display */
    .hero-timezone {
      font-family: 'Roboto Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-bottom: 48px;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 4px;
      align-items: baseline;
    }
    .cd-block {
      text-align: center;
    }
    .cd-value {
      font-family: 'Roboto Mono', monospace;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }
    .cd-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .cd-sep {
      font-family: 'Roboto Mono', monospace;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 200;
      color: var(--text-muted);
      padding: 0 8px;
    }

    /* ── Loading / Error ── */
    .skeleton {
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
    .error-msg {
      font-size: 12px;
      font-weight: 300;
      color: var(--red);
      padding: 16px 0;
      border: 1px solid rgba(248,113,113,0.15);
      padding: 14px 20px;
      margin-bottom: 16px;
    }

    /* ── Flight Cards ── */
    .flights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .flight-card {
      background: var(--bg);
      padding: 28px;
      transition: background 0.2s;
    }
    .flight-card:hover {
      background: rgba(255,255,255,0.02);
    }
    .flight-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .flight-num {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .flight-name {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: -0.01em;
    }
    /* Status: dot + text */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-green { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red { background: var(--red); }
    .dot-gray { background: var(--gray); }
    .dot-blue { background: var(--accent); }

    /* Hardware rows in cards */
    .hw-rows { display: flex; flex-direction: column; gap: 8px; }
    .hw-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
    }
    .hw-icon-char {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      min-width: 18px;
      text-transform: uppercase;
    }
    .hw-serial {
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
    }
    .hw-note {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-muted);
      margin-left: auto;
    }
    .hw-version {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .flight-date-row {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .flight-date-row strong {
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── Pipeline ── */
    .pipeline {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 32px;
    }
    .pipeline-col h3 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .pipeline-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .pipeline-item:nth-child(even) {
      background: rgba(255,255,255,0.015);
    }
    .pipeline-item:last-child {
      border-bottom: none;
    }
    .pipe-serial {
      font-family: 'Roboto Mono', monospace;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      min-width: 48px;
    }
    .pipe-info {
      flex: 1;
    }
    .pipe-status-text {
      font-size: 12px;
      font-weight: 300;
      color: var(--text-muted);
    }
    .pipe-version {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .pipe-flight {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    /* Progress bar in pipeline */
    .pipe-progress {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin-top: 6px;
      overflow: hidden;
    }
    .pipe-progress-fill {
      height: 100%;
      background: var(--text-secondary);
      transition: width 0.6s ease;
    }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      padding: 32px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer-text {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .footer-attr {
      font-size: 10px;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .footer-attr a {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      transition: border-color 0.2s;
    }
    .footer-attr a:hover {
      border-color: var(--text-secondary);
    }

    /* ── Skeletons ── */
    .skel-hero-title { height: 64px; width: 400px; max-width: 80%; margin-bottom: 16px; }
    .skel-hero-sub   { height: 16px; width: 300px; max-width: 60%; margin-bottom: 48px; }
    .skel-hero-cd    { height: 56px; width: 320px; max-width: 70%; }
    .skel-card       { height: 200px; }
    .skel-pipe       { height: 50px; margin-bottom: 1px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .wrapper { padding: 0 16px 60px; }
      .hero { padding: 48px 0 40px; }
      .pipeline { grid-template-columns: 1fr; gap: 48px; }
      .flights-grid { grid-template-columns: 1fr; }
      .nav-link { display: none; }
      .countdown { gap: 2px; }
      .cd-sep { padding: 0 4px; }
      .hero-subtitle { flex-direction: column; gap: 4px; }
      .hero-sep { display: none; }
    }
  </style>
</head>
<body>

<!-- Refresh progress bar -->
<div id="refresh-bar"></div>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <a href="#" class="logo">
      <span class="logo-light">STARSHIP</span><span class="logo-bold">WATCH</span>
    </a>
    <div class="nav-right">
      <a href="#flights-section" class="nav-link">Flights</a>
      <a href="#pipeline-section" class="nav-link">Hardware</a>
      <span class="last-updated" id="last-updated">--:--:--</span>
    </div>
  </div>
</nav>

<div class="wrapper">

  <!-- Hero / Next Launch -->
  <div class="hero" id="banner">
    <div class="hero-label"><div class="hero-dot"></div> NEXT LAUNCH</div>
    <div class="skeleton skel-hero-title"></div>
    <div class="skeleton skel-hero-sub"></div>
    <div class="skeleton skel-hero-cd"></div>
  </div>

  <!-- Upcoming Flights -->
  <div class="section-label" id="flights-section">UPCOMING FLIGHTS</div>
  <div id="error-flights" style="display:none" class="error-msg">Could not load flights.</div>
  <div class="flights-grid" id="flights-grid">
    <div class="flight-card"><div class="skeleton skel-card"></div></div>
    <div class="flight-card"><div class="skeleton skel-card"></div></div>
  </div>

  <!-- Hardware Pipeline -->
  <div class="section-label" id="pipeline-section">HARDWARE PIPELINE</div>
  <div id="error-pipeline" style="display:none" class="error-msg">Could not load hardware pipeline.</div>
  <div class="pipeline">
    <div class="pipeline-col" id="boosters-col">
      <h3>SUPER HEAVY BOOSTERS</h3>
      <div class="skeleton skel-pipe"></div>
      <div class="skeleton skel-pipe"></div>
    </div>
    <div class="pipeline-col" id="ships-col">
      <h3>STARSHIP VEHICLES</h3>
      <div class="skeleton skel-pipe"></div>
      <div class="skeleton skel-pipe"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-text">STARSHIP WATCH &middot; NOT AFFILIATED WITH SPACEX</div>
    <div class="footer-attr">Data sourced from community reporting &amp; <span id="footer-link"></span></div>
  </footer>

</div>

<!-- Supabase JS client (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─────────────────────────────────────────────
// CONFIG — replace with your project values
// ─────────────────────────────────────────────
const SUPABASE_URL      = 'SUPABASE_URL_PLACEHOLDER';
const SUPABASE_ANON_KEY = 'SUPABASE_ANON_KEY_PLACEHOLDER';
// ─────────────────────────────────────────────

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Timezone Helpers ─────────────────────────
const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
const launchSiteTZ = 'America/Chicago';

function getTZAbbr(date, tz) {
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName: 'short'
    }).formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : '';
  } catch { return ''; }
}

function formatTimeInTZ(date, tz) {
  return date.toLocaleTimeString('en-US', {
    timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false
  });
}

function formatDateUpper(date) {
  return date.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();
}

function buildTimezoneString(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00-05:00');
  if (isNaN(d)) return '';

  const launchTime = formatTimeInTZ(d, launchSiteTZ);
  const launchAbbr = getTZAbbr(d, launchSiteTZ);
  const localTime  = formatTimeInTZ(d, userTZ);
  const localAbbr  = getTZAbbr(d, userTZ);
  const utcTime    = formatTimeInTZ(d, 'UTC');
  const dateUpper  = formatDateUpper(d);

  let str = `${dateUpper} · ${launchTime} ${launchAbbr} (LAUNCH SITE)`;
  if (userTZ !== launchSiteTZ) {
    str += ` · ${localTime} ${localAbbr} (YOUR TIME)`;
  }
  str += ` · ${utcTime} UTC`;
  return str;
}

// ── Countdown ────────────────────────────────
let countdownTarget = null;
let countdownTimer  = null;

function pad(n) { return String(n).padStart(2, '0'); }

function startCountdown(dateStr) {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTarget = dateStr ? new Date(dateStr + 'T12:00:00-05:00') : null;

  function tick() {
    const el = document.getElementById('countdown-el');
    if (!el) return;

    if (!countdownTarget) {
      el.innerHTML = '<span style="font-size:14px;font-weight:300;color:rgba(255,255,255,0.3)">DATE TBD</span>';
      return;
    }

    const diff = countdownTarget - Date.now();
    if (diff <= 0) {
      el.innerHTML = '<span style="font-size:14px;font-weight:300;color:var(--green)">T-0 — LAUNCH WINDOW OPEN</span>';
      return;
    }

    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000)  / 60000);
    const secs  = Math.floor((diff % 60000)    / 1000);

    el.innerHTML = `
      <div class="cd-block"><div class="cd-value">${pad(days)}</div><div class="cd-label">DAYS</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-value">${pad(hours)}</div><div class="cd-label">HOURS</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-value">${pad(mins)}</div><div class="cd-label">MINS</div></div>
      <div class="cd-sep">:</div>
      <div class="cd-block"><div class="cd-value">${pad(secs)}</div><div class="cd-label">SECS</div></div>
    `;
  }

  tick();
  countdownTimer = setInterval(tick, 1000);
}

// ── Status Helpers ───────────────────────────
const STATUS_DOT = {
  upcoming:   'dot-blue',
  net:        'dot-yellow',
  scrubbed:   'dot-red',
  launched:   'dot-green',
  success:    'dot-green',
  partial:    'dot-yellow',
  failure:    'dot-red',
  planned:    'dot-gray',
  production: 'dot-gray',
  stacking:   'dot-yellow',
  stacked:    'dot-yellow',
  testing:    'dot-yellow',
  ready:      'dot-green',
  retired:    'dot-gray',
  destroyed:  'dot-red',
};

function statusHtml(status, label) {
  const dot = STATUS_DOT[status] ?? 'dot-gray';
  return `<div class="status-indicator"><span class="status-dot ${dot}"></span>${label ?? status}</div>`;
}

function fmtDate(dateStr) {
  if (!dateStr) return 'TBD';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  }).toUpperCase();
}

// ── Render: Banner ────────────────────────────
function renderBanner(row) {
  const banner = document.getElementById('banner');

  if (!row) {
    banner.innerHTML = `
      <div class="hero-label"><div class="hero-dot"></div> NEXT LAUNCH</div>
      <div class="hero-title">STAY TUNED</div>
      <div class="hero-subtitle" style="color:var(--text-muted)">No upcoming flights scheduled</div>`;
    return;
  }

  const parts = [];
  if (row.launch_site) parts.push(row.launch_site);
  if (row.booster_serial) {
    let b = row.booster_serial;
    if (row.booster_version) b += ` (${row.booster_version})`;
    parts.push(b);
  }
  if (row.ship_serial) parts.push(row.ship_serial);

  const tzStr = buildTimezoneString(row.net_date);

  banner.innerHTML = `
    <div class="hero-label"><div class="hero-dot"></div> NEXT LAUNCH</div>
    <div class="hero-title">${(row.name || '').toUpperCase()}</div>
    <div class="hero-subtitle">
      ${parts.map((p, i) => `<span>${p}</span>${i < parts.length - 1 ? '<span class="hero-sep">/</span>' : ''}`).join('')}
    </div>
    ${tzStr ? `<div class="hero-timezone">${tzStr}</div>` : ''}
    <div class="countdown" id="countdown-el"></div>
  `;

  startCountdown(row.net_date);

  if (row.spacex_url) {
    document.getElementById('footer-link').innerHTML =
      `<a href="${row.spacex_url}" target="_blank">SpaceX mission page</a>`;
  }
}

// ── Render: Flight Cards ──────────────────────
function renderFlights(flights, assignments) {
  const grid = document.getElementById('flights-grid');

  if (!flights.length) {
    grid.innerHTML = '<p style="color:var(--text-muted);font-size:12px;font-weight:300;padding:32px;">No upcoming flights found.</p>';
    grid.style.background = 'none';
    grid.style.border = 'none';
    return;
  }

  const hwMap = {};
  for (const a of assignments) {
    if (!a.is_primary) continue;
    hwMap[a.flight_id] = { booster: a.boosters, ship: a.ships };
  }

  grid.innerHTML = flights.map((f) => {
    const hw      = hwMap[f.id] ?? {};
    const booster = hw.booster;
    const ship    = hw.ship;
    const statusLabel = f.status === 'net' ? `NET ${fmtDate(f.net_date)}` : f.status;

    const boosterHtml = booster ? `
      <div class="hw-row">
        <span class="hw-icon-char">B</span>
        <span class="hw-serial">${booster.serial}</span>
        ${booster.version ? `<span class="hw-version">${booster.version}</span>` : ''}
        ${booster.notes ? `<span class="hw-note">${booster.notes}</span>` : ''}
      </div>` : '';

    const shipHtml = ship ? `
      <div class="hw-row">
        <span class="hw-icon-char">S</span>
        <span class="hw-serial">${ship.serial}</span>
        ${ship.notes ? `<span class="hw-note">${ship.notes}</span>` : ''}
      </div>` : '';

    return `
      <div class="flight-card">
        <div class="flight-header">
          <div>
            <div class="flight-num">IFT-${f.flight_num}</div>
            <div class="flight-name">${f.name}</div>
          </div>
          ${statusHtml(f.status, statusLabel)}
        </div>
        <div class="hw-rows">
          ${boosterHtml}
          ${shipHtml}
          ${!boosterHtml && !shipHtml ? '<div class="hw-row" style="color:var(--text-muted);font-size:12px;font-weight:300;">Hardware TBD</div>' : ''}
        </div>
        <div class="flight-date-row">
          <span>${f.status === 'net' ? 'NET' : 'EST'}</span>
          <strong>${fmtDate(f.net_date)}</strong>
        </div>
      </div>`;
  }).join('');
}

// ── Render: Pipeline ──────────────────────────
function renderPipeline(boosters, ships) {
  const bCol = document.getElementById('boosters-col');
  const sCol = document.getElementById('ships-col');

  const pipeItem = (serial, statusStr, pct, flightNum, version) => `
    <div class="pipeline-item">
      <div class="pipe-serial">${serial}</div>
      <div class="pipe-info">
        <div style="display:flex;align-items:center;gap:8px;">
          ${statusHtml(statusStr, statusStr)}
          ${version ? `<span class="pipe-version">${version}</span>` : ''}
        </div>
        <div class="pipe-progress"><div class="pipe-progress-fill" style="width:${pct ?? 0}%"></div></div>
      </div>
      ${flightNum ? `<div class="pipe-flight">IFT-${flightNum}</div>` : ''}
    </div>`;

  bCol.innerHTML = '<h3>SUPER HEAVY BOOSTERS</h3>' +
    (boosters.length
      ? boosters.map(b => pipeItem(
          b.serial,
          b.status,
          b.progress_pct,
          b.flights?.flight_num,
          b.version
        )).join('')
      : '<p style="font-size:12px;color:var(--text-muted);font-weight:300;">No data.</p>');

  sCol.innerHTML = '<h3>STARSHIP VEHICLES</h3>' +
    (ships.length
      ? ships.map(s => pipeItem(
          s.serial,
          s.status,
          s.progress_pct,
          s.flights?.flight_num,
          null
        )).join('')
      : '<p style="font-size:12px;color:var(--text-muted);font-weight:300;">No data.</p>');
}

// ── Auto-Refresh (60s) ───────────────────────
const REFRESH_INTERVAL = 60; // seconds
let refreshElapsed = 0;
let refreshBarTimer = null;

function updateRefreshBar() {
  refreshElapsed++;
  const pct = Math.min((refreshElapsed / REFRESH_INTERVAL) * 100, 100);
  document.getElementById('refresh-bar').style.width = pct + '%';

  if (refreshElapsed >= REFRESH_INTERVAL) {
    refreshElapsed = 0;
    document.getElementById('refresh-bar').style.transition = 'none';
    document.getElementById('refresh-bar').style.width = '0%';
    requestAnimationFrame(() => {
      document.getElementById('refresh-bar').style.transition = 'width 1s linear';
    });
    loadAll();
  }
}

function startRefreshBar() {
  if (refreshBarTimer) clearInterval(refreshBarTimer);
  refreshElapsed = 0;
  document.getElementById('refresh-bar').style.width = '0%';
  refreshBarTimer = setInterval(updateRefreshBar, 1000);
}

// ── Load everything ───────────────────────────
async function loadAll() {
  const now = new Date();
  document.getElementById('last-updated').textContent =
    'UPDATED ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

  const [bannerRes, flightsRes, assignRes, boostersRes, shipsRes] = await Promise.all([
    sb.from('next_launch').select('*').single(),

    sb.from('flights')
      .select('id, flight_num, name, status, net_date, net_confirmed')
      .in('status', ['upcoming', 'net'])
      .order('net_date', { ascending: true, nullsFirst: false })
      .order('flight_num', { ascending: true }),

    sb.from('flight_assignments')
      .select('flight_id, is_primary, boosters(serial, version, notes, status), ships(serial, status, notes)')
      .eq('is_primary', true),

    sb.from('boosters')
      .select('serial, version, status, progress_pct, notes, flights(flight_num)')
      .order('serial', { ascending: true }),

    sb.from('ships')
      .select('serial, status, progress_pct, notes, flights(flight_num)')
      .order('serial', { ascending: true }),
  ]);

  // Banner
  if (bannerRes.error) {
    document.getElementById('banner').innerHTML =
      '<div class="error-msg">Could not load next launch data.</div>';
  } else {
    renderBanner(bannerRes.data);
  }

  // Flights
  if (flightsRes.error || assignRes.error) {
    document.getElementById('error-flights').style.display = 'block';
    document.getElementById('flights-grid').innerHTML = '';
  } else {
    document.getElementById('error-flights').style.display = 'none';
    renderFlights(flightsRes.data, assignRes.data);
  }

  // Pipeline
  if (boostersRes.error || shipsRes.error) {
    document.getElementById('error-pipeline').style.display = 'block';
  } else {
    document.getElementById('error-pipeline').style.display = 'none';
    renderPipeline(boostersRes.data, shipsRes.data);
  }
}

loadAll();
startRefreshBar();
</script>
